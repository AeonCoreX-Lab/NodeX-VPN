# .github/workflows/release.yml
#
# NodeX VPN — Unified Release Pipeline
# Powered by AeonCoreX
#
# Triggers on: git push of a version tag  →  v0.1.0 / v1.2.3 / v1.0.0-beta.1
#
# ci.yml runs on every push/PR and uploads artifacts with retention-days: 30.
# This workflow downloads those same artifacts + builds CLI binaries,
# publishes to npm, then creates ONE GitHub Release with everything.
#
# Pipeline:
#   1. validate       — tag == Cargo.toml == npm/package.json version
#   2. build-cli      — build nodex binary for 7 platforms (parallel)
#   3. npm-publish    — inject binaries into platform packages, publish to npm
#   4. release        — ONE GitHub Release with all artifacts + SHA256SUMS
#
# Secrets required (Settings → Secrets → Actions):
#   NPM_TOKEN        — npmjs.com Automation token  (Settings → Access Tokens)
#   GITHUB_TOKEN     — auto-provided by GitHub Actions

name: Release

on:
  push:
    tags:
      - "v[0-9]+.[0-9]+.[0-9]+"
      - "v[0-9]+.[0-9]+.[0-9]+-*"   # pre-release: v1.0.0-beta.1

env:
  CARGO_TERM_COLOR: always
  CARGO_INCREMENTAL: 0
  RUST_BACKTRACE: 1

# ── 1. Validate ───────────────────────────────────────────────────────────────

jobs:
  validate:
    name: Validate version tag
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.ver.outputs.version }}
    steps:
      - uses: actions/checkout@v4

      - name: Tag == Cargo.toml version
        id: ver
        run: |
          CARGO_VER=$(grep '^version' rust-core/Cargo.toml | head -1 | sed 's/.*= *"\(.*\)"/\1/')
          TAG_VER="${GITHUB_REF_NAME#v}"
          echo "Cargo.toml: $CARGO_VER  |  Tag: $TAG_VER"
          if [ "$CARGO_VER" != "$TAG_VER" ]; then
            echo "::error::Tag $GITHUB_REF_NAME != Cargo.toml version $CARGO_VER"
            echo "::error::Fix: update version in rust-core/Cargo.toml, then retag"
            exit 1
          fi
          echo "version=$CARGO_VER" >> "$GITHUB_OUTPUT"

      - name: Tag == npm/package.json version
        run: |
          NPM_VER=$(node -p "require('./npm/package.json').version")
          TAG_VER="${GITHUB_REF_NAME#v}"
          if [ "$NPM_VER" != "$TAG_VER" ]; then
            echo "::error::npm/package.json version ($NPM_VER) != tag ($TAG_VER)"
            echo "::error::Fix: node scripts/bump-version.js $TAG_VER"
            exit 1
          fi

# ── 2. Build CLI binaries ─────────────────────────────────────────────────────

  build-cli:
    name: Build CLI — ${{ matrix.label }}
    needs: validate
    runs-on: ${{ matrix.os }}

    strategy:
      fail-fast: false
      matrix:
        include:
          # ── Linux ────────────────────────────────────────────────────────────
          - label:     linux-x86_64
            os:        ubuntu-22.04
            target:    x86_64-unknown-linux-gnu
            use_cross: false
            artifact:  nodex-linux-x86_64
            npm_pkg:   linux-x64
            bin:       nodex
            archive:   tar.gz

          - label:     linux-aarch64
            os:        ubuntu-22.04
            target:    aarch64-unknown-linux-gnu
            use_cross: true
            artifact:  nodex-linux-aarch64
            npm_pkg:   linux-arm64
            bin:       nodex
            archive:   tar.gz

          # ── macOS ────────────────────────────────────────────────────────────
          - label:     macos-arm64
            os:        macos-14
            target:    aarch64-apple-darwin
            use_cross: false
            artifact:  nodex-macos-arm64
            npm_pkg:   darwin-arm64
            bin:       nodex
            archive:   tar.gz

          - label:     macos-x86_64
            os:        macos-13
            target:    x86_64-apple-darwin
            use_cross: false
            artifact:  nodex-macos-x86_64
            npm_pkg:   darwin-x64
            bin:       nodex
            archive:   tar.gz

          # ── Windows ──────────────────────────────────────────────────────────
          - label:     windows-x86_64
            os:        windows-latest
            target:    x86_64-pc-windows-msvc
            use_cross: false
            artifact:  nodex-windows-x86_64
            npm_pkg:   win32-x64
            bin:       nodex.exe
            archive:   zip

          - label:     windows-arm64
            os:        windows-latest
            target:    aarch64-pc-windows-msvc
            use_cross: false
            artifact:  nodex-windows-arm64
            npm_pkg:   win32-arm64
            bin:       nodex.exe
            archive:   zip

          # ── FreeBSD (router / pfSense / OPNsense) ────────────────────────────
          - label:     freebsd-x86_64
            os:        ubuntu-22.04
            target:    x86_64-unknown-freebsd
            use_cross: true
            artifact:  nodex-freebsd-x86_64
            npm_pkg:   ""            # FreeBSD not on npm
            bin:       nodex
            archive:   tar.gz

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Cache Cargo registry
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
          key: release-${{ matrix.target }}-${{ hashFiles('rust-core/Cargo.lock') }}
          restore-keys: release-${{ matrix.target }}-

      - name: Install cross
        if: matrix.use_cross
        run: cargo install cross --git https://github.com/cross-rs/cross --locked

      - name: Build CLI binary (native)
        if: "!matrix.use_cross"
        working-directory: rust-core
        env:
          SOURCE_DATE_EPOCH: "0"
          NODEX_GOOGLE_CLIENT_ID:             ${{ secrets.GOOGLE_CLIENT_ID }}
          NODEX_GOOGLE_CLIENT_SECRET:         ${{ secrets.GOOGLE_CLIENT_SECRET }}
          NODEX_DESKTOP_GOOGLE_CLIENT_ID:     ${{ secrets.DESKTOP_GOOGLE_CLIENT_ID }}
          NODEX_DESKTOP_GOOGLE_CLIENT_SECRET: ${{ secrets.DESKTOP_GOOGLE_CLIENT_SECRET }}
          FIREBASE_WEB_API_KEY:               ${{ secrets.FIREBASE_WEB_API_KEY }}
        run: cargo build --release --features cli --bin nodex --target ${{ matrix.target }}

      - name: Build CLI binary (cross)
        if: matrix.use_cross
        working-directory: rust-core
        env:
          SOURCE_DATE_EPOCH: "0"
          NODEX_GOOGLE_CLIENT_ID:     ${{ secrets.GOOGLE_CLIENT_ID }}
          NODEX_GOOGLE_CLIENT_SECRET: ${{ secrets.GOOGLE_CLIENT_SECRET }}
        run: cross build --release --features cli --bin nodex --target ${{ matrix.target }}

      # ── Package for GitHub Release ────────────────────────────────────────────
      - name: Package (tar.gz)
        if: matrix.archive == 'tar.gz'
        shell: bash
        run: |
          BIN=rust-core/target/${{ matrix.target }}/release/nodex
          OUT=${{ matrix.artifact }}-v${{ needs.validate.outputs.version }}
          mkdir -p dist/$OUT
          cp $BIN RELEASES.md LICENSE dist/$OUT/
          cd dist && tar -czf ${OUT}.tar.gz $OUT
          echo "ASSET=dist/${OUT}.tar.gz" >> $GITHUB_ENV

      - name: Package (zip)
        if: matrix.archive == 'zip'
        shell: pwsh
        run: |
          $BIN = "rust-core/target/${{ matrix.target }}/release/nodex.exe"
          $OUT = "${{ matrix.artifact }}-v${{ needs.validate.outputs.version }}"
          New-Item -ItemType Directory -Path "dist/$OUT" | Out-Null
          Copy-Item $BIN, "RELEASES.md", "LICENSE" "dist/$OUT/"
          Compress-Archive -Path "dist/$OUT" -DestinationPath "dist/${OUT}.zip"
          echo "ASSET=dist/${OUT}.zip" | Out-File -Append $env:GITHUB_ENV

      - name: Upload GitHub Release artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: ${{ env.ASSET }}
          retention-days: 1

      # ── Upload raw binary for npm job ─────────────────────────────────────────
      - name: Upload raw binary (npm inject)
        if: matrix.npm_pkg != ''
        uses: actions/upload-artifact@v4
        with:
          name: npm-bin-${{ matrix.npm_pkg }}
          path: rust-core/target/${{ matrix.target }}/release/${{ matrix.bin }}
          retention-days: 1

# ── 3. npm publish ────────────────────────────────────────────────────────────

  npm-publish:
    name: Publish to npm
    needs: [validate, build-cli]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          registry-url: "https://registry.npmjs.org"

      # Copy LICENSE into npm/ (required by package.json files field)
      - name: Copy LICENSE into npm/
        run: cp LICENSE npm/LICENSE

      # Sync version into all package.json files
      - name: Bump all npm package versions → ${{ needs.validate.outputs.version }}
        env:
          VERSION: ${{ needs.validate.outputs.version }}
        run: |
          node << 'JS'
          const fs  = require("fs");
          const ver = process.env.VERSION;

          // Base package
          const base = JSON.parse(fs.readFileSync("npm/package.json"));
          base.version = ver;
          for (const k of Object.keys(base.optionalDependencies || {})) {
            base.optionalDependencies[k] = ver;
          }
          fs.writeFileSync("npm/package.json", JSON.stringify(base, null, 2) + "\n");

          // Platform packages
          for (const dir of fs.readdirSync("npm/packages")) {
            const p = `npm/packages/${dir}/package.json`;
            if (!fs.existsSync(p)) continue;
            const pkg = JSON.parse(fs.readFileSync(p));
            pkg.version = ver;
            fs.writeFileSync(p, JSON.stringify(pkg, null, 2) + "\n");
            console.log(`  ✔ ${pkg.name}@${ver}`);
          }
          JS

      # Download platform binaries
      - name: Download linux-x64
        uses: actions/download-artifact@v4
        with: { name: npm-bin-linux-x64,   path: /tmp/bins/linux-x64/   }

      - name: Download linux-arm64
        uses: actions/download-artifact@v4
        with: { name: npm-bin-linux-arm64,  path: /tmp/bins/linux-arm64/  }

      - name: Download darwin-x64
        uses: actions/download-artifact@v4
        with: { name: npm-bin-darwin-x64,   path: /tmp/bins/darwin-x64/   }

      - name: Download darwin-arm64
        uses: actions/download-artifact@v4
        with: { name: npm-bin-darwin-arm64, path: /tmp/bins/darwin-arm64/ }

      - name: Download win32-x64
        uses: actions/download-artifact@v4
        with: { name: npm-bin-win32-x64,    path: /tmp/bins/win32-x64/    }

      - name: Download win32-arm64
        uses: actions/download-artifact@v4
        with: { name: npm-bin-win32-arm64,  path: /tmp/bins/win32-arm64/  }

      # Inject binaries into platform packages
      - name: Inject binaries
        run: |
          for P in linux-x64 linux-arm64 darwin-x64 darwin-arm64; do
            SRC=/tmp/bins/$P/nodex
            DST=npm/packages/$P/bin/nodex
            cp "$SRC" "$DST" && chmod 755 "$DST"
            echo "  ✔ $P/nodex ($(du -sh $DST | cut -f1))"
          done
          for P in win32-x64 win32-arm64; do
            SRC=/tmp/bins/$P/nodex.exe
            DST=npm/packages/$P/bin/nodex.exe
            cp "$SRC" "$DST"
            echo "  ✔ $P/nodex.exe ($(du -sh $DST | cut -f1))"
          done

      # Publish platform packages first (base depends on them)
      - name: Publish platform packages
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: |
          TAG=${{ contains(github.ref_name, '-') && 'next' || 'latest' }}
          for DIR in npm/packages/*/; do
            PKG=$(node -p "require('./${DIR}package.json').name")
            echo "Publishing $PKG (tag=$TAG)…"
            cd "$DIR"
            npm publish --access public --tag "$TAG"
            cd - > /dev/null
            echo "  ✔ $PKG"
          done

      # Publish base package
      - name: Publish @aeoncorex/nodex-vpn
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: |
          TAG=${{ contains(github.ref_name, '-') && 'next' || 'latest' }}
          cd npm
          npm publish --access public --tag "$TAG"
          echo "  ✔ @aeoncorex/nodex-vpn"

      # Smoke-test — use --prefix to avoid sudo on GitHub runners
      - name: Smoke-test npm install
        run: |
          sleep 20   # wait for registry propagation
          mkdir -p /tmp/nodex-test
          npm install --prefix /tmp/nodex-test @aeoncorex/nodex-vpn@${{ needs.validate.outputs.version }}
          /tmp/nodex-test/bin/nodex version
          echo "  ✔ Smoke-test passed"

# ── 4. Unified GitHub Release ─────────────────────────────────────────────────

  release:
    name: Publish GitHub Release
    needs: [validate, build-cli, npm-publish]
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      # Download CLI artifacts built in this workflow
      - name: Download CLI artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist/
          # Only download the packaged archives, not raw npm binaries
          pattern: "nodex-*"

      - name: Flatten artifact directories
        run: |
          find dist/ -type f \( -name "*.tar.gz" -o -name "*.zip" \) -exec mv {} dist/ \;
          find dist/ -mindepth 1 -maxdepth 1 -type d -exec rm -rf {} +
          echo "CLI artifacts:"
          ls -lh dist/

      - name: Generate SHA-256 checksums
        run: |
          cd dist
          sha256sum *.tar.gz *.zip 2>/dev/null | tee SHA256SUMS.txt
          echo "Checksums generated:"
          cat SHA256SUMS.txt

      - name: Extract changelog for ${{ needs.validate.outputs.version }}
        id: changelog
        run: |
          VER=${{ needs.validate.outputs.version }}
          NOTES=$(awk "/^## \[$VER\]/{flag=1;next} /^## \[/{flag=0} flag" RELEASES.md)
          [ -z "$NOTES" ] && NOTES="See RELEASES.md for full changelog."
          { echo "notes<<EOF"; echo "$NOTES"; echo "EOF"; } >> "$GITHUB_OUTPUT"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name:   ${{ github.ref_name }}
          name:       "NodeX VPN ${{ github.ref_name }}"
          draft:      false
          prerelease: ${{ contains(github.ref_name, '-') }}
          body: |
            ## NodeX VPN ${{ github.ref_name }}
            **Powered by AeonCoreX** · Tor-based Privacy VPN

            ${{ steps.changelog.outputs.notes }}

            ---

            ### Install via npm *(easiest)*
            ```bash
            npm install -g @aeoncorex/nodex-vpn
            nodex version
            ```
            Run without installing:
            ```bash
            npx @aeoncorex/nodex-vpn connect --country DE
            ```

            ---

            ### Manual Install

            **Linux / Termux (Android)**
            ```bash
            tar -xzf nodex-linux-x86_64-${{ github.ref_name }}.tar.gz
            sudo mv nodex-linux-x86_64-${{ github.ref_name }}/nodex /usr/local/bin/
            nodex version
            ```

            **macOS**
            ```bash
            tar -xzf nodex-macos-arm64-${{ github.ref_name }}.tar.gz
            sudo mv nodex-macos-arm64-${{ github.ref_name }}/nodex /usr/local/bin/
            nodex version
            ```

            **Windows** — `.zip` extract করুন, folder টি `PATH`-এ add করুন:
            ```powershell
            nodex.exe version
            ```

            **FreeBSD / pfSense / OPNsense**
            ```bash
            tar -xzf nodex-freebsd-x86_64-${{ github.ref_name }}.tar.gz
            sudo mv nodex-freebsd-x86_64-${{ github.ref_name }}/nodex /usr/local/bin/
            nodex version
            ```

            ---
            SHA-256 checksums: `SHA256SUMS.txt` নিচে attached।

          files: |
            dist/*.tar.gz
            dist/*.zip
            dist/SHA256SUMS.txt
