# Cross.toml — cross-compilation config for NodeX-VPN rust-core
#
# Problem: ghcr.io/cross-rs/x86_64-unknown-freebsd:0.2.5 sysroot is missing
# libgeom.a (required by the `tun` crate), causing:
#   ld: cannot find -lgeom
#
# Fix: pre-build fetches libgeom.a from the FreeBSD archive.
#
# NOTE: FreeBSD 12.4-RELEASE is EOL — primary download.freebsd.org URL
# returns 404. We use the correct subdirectory path and fall back to the
# ftp-archive mirror which keeps old releases permanently.

[target.x86_64-unknown-freebsd]
pre-build = [
    "apt-get update -qq",
    "apt-get install -y --no-install-recommends curl xz-utils",
    "curl -fsSL --retry 3 --retry-delay 2 'https://download.freebsd.org/releases/amd64/amd64/12.4-RELEASE/base.txz' | tar -xJ -C /usr/local/x86_64-unknown-freebsd12 --strip-components=1 usr/lib/libgeom.a || curl -fsSL --retry 3 --retry-delay 2 'https://ftp-archive.freebsd.org/pub/FreeBSD-Archive/old-releases/amd64/12.4-RELEASE/base.txz' | tar -xJ -C /usr/local/x86_64-unknown-freebsd12 --strip-components=1 usr/lib/libgeom.a",
]
