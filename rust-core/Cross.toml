# Cross.toml — cross-compilation config for NodeX-VPN rust-core
#
# Problem: ghcr.io/cross-rs/x86_64-unknown-freebsd:0.2.5 sysroot is missing
# several system libraries required by the `sysinfo` and `tun` crates:
#   -lgeom -lkvm -lmemstat -lprocstat -ldevstat
#
# Root cause: FreeBSD 12.4 is EOL. Both download.freebsd.org and
# archive.freebsd.org are unreliable / return 404 / SSL issues.
#
# Fix: Instead of downloading base.txz, use the FreeBSD cross-compiler
# that is ALREADY bundled inside the Docker image to compile minimal
# stub object files and create proper FreeBSD ELF static libraries.
# No network access needed. 100% reliable.
#
# Stubs satisfy the linker — at runtime on real FreeBSD the dynamic
# linker resolves these symbols from the actual system libraries.

[target.x86_64-unknown-freebsd]
pre-build = [
    # Step 1: locate the FreeBSD cross-compiler bundled in the image
    "CROSS_CC=$(find /usr /opt -name 'x86_64-unknown-freebsd*-gcc' 2>/dev/null | head -1); echo \"Cross compiler: ${CROSS_CC:-NOT FOUND}\"",

    # Step 2: write a C stub that satisfies all missing symbol references
    "cat > /tmp/freebsd_stubs.c << 'CEOF'\n/* Stub implementations for FreeBSD sysroot libraries missing from\n   ghcr.io/cross-rs/x86_64-unknown-freebsd:0.2.5 */\n#include <stddef.h>\n#include <stdint.h>\n/* libgeom — used by sysinfo for disk I/O stats */\ntypedef void* gctl_req_t;\nint geom_stats_open(void)          { return 0; }\nvoid geom_stats_close(void)        {}\nvoid *geom_stats_snapshot_get(void){ return NULL; }\nvoid geom_stats_snapshot_reset(void *h) {}\nvoid *geom_stats_snapshot_next(void *h, void *dt){ return NULL; }\nvoid geom_stats_snapshot_free(void *h) {}\nvoid *geom_open(void)              { return NULL; }\nvoid geom_close(void *hdl)         {}\n/* libkvm — kernel memory access */\nvoid *kvm_open(const char *e, const char *c, const char *s, int f, const char *m){ return NULL; }\nint   kvm_close(void *kd)          { return 0; }\n/* libmemstat — memory allocator stats */\nvoid *memstat_mtl_alloc(void)      { return NULL; }\nvoid  memstat_mtl_free(void *mtl)  {}\nint   memstat_sysctl_all(void *mtl, int flags){ return 0; }\n/* libprocstat — process stats */\nvoid *procstat_open_sysctl(void)   { return NULL; }\nvoid  procstat_close(void *pstat)  {}\n/* libdevstat — device statistics */\nint devstat_checkversion(void *p)  { return 0; }\nvoid *devstat_alloc(void)          { return NULL; }\nCEOF",

    # Step 3: compile and archive into .a files for each missing library
    "CROSS_CC=$(find /usr /opt -name 'x86_64-unknown-freebsd*-gcc' 2>/dev/null | head -1) && \
     CROSS_AR=$(find /usr /opt -name 'x86_64-unknown-freebsd*-ar'  2>/dev/null | head -1) && \
     SYSROOT=/usr/local/x86_64-unknown-freebsd12 && \
     $CROSS_CC -c /tmp/freebsd_stubs.c -o /tmp/freebsd_stubs.o && \
     for lib in geom kvm memstat procstat devstat; do \
       [ -f ${SYSROOT}/lib/lib${lib}.a ] && echo \"lib${lib}.a exists\" && continue; \
       $CROSS_AR rcs ${SYSROOT}/lib/lib${lib}.a /tmp/freebsd_stubs.o && \
       echo \"Created: lib${lib}.a\"; \
     done && echo 'FreeBSD stubs: done'",
]

# aarch64-unknown-freebsd — for ARM-based OPNsense routers, Orange Pi 5,
# Raspberry Pi running FreeBSD, etc.
# cross-rs Docker image: ghcr.io/cross-rs/aarch64-unknown-freebsd:0.2.5
# Same sysroot stub approach as x86_64.
[target.aarch64-unknown-freebsd]
pre-build = [
    "CROSS_CC=$(find /usr /opt -name 'aarch64-unknown-freebsd*-gcc' 2>/dev/null | head -1); echo \"Cross compiler: ${CROSS_CC:-NOT FOUND}\"",

    "cat > /tmp/freebsd_stubs.c << 'CEOF'\n#include <stddef.h>\n#include <stdint.h>\nint geom_stats_open(void)          { return 0; }\nvoid geom_stats_close(void)        {}\nvoid *geom_stats_snapshot_get(void){ return NULL; }\nvoid geom_stats_snapshot_reset(void *h) {}\nvoid *geom_stats_snapshot_next(void *h, void *dt){ return NULL; }\nvoid geom_stats_snapshot_free(void *h) {}\nvoid *kvm_open(const char *e, const char *c, const char *s, int f, const char *m){ return NULL; }\nint   kvm_close(void *kd)          { return 0; }\nvoid *memstat_mtl_alloc(void)      { return NULL; }\nvoid  memstat_mtl_free(void *mtl)  {}\nint   memstat_sysctl_all(void *mtl, int flags){ return 0; }\nvoid *procstat_open_sysctl(void)   { return NULL; }\nvoid  procstat_close(void *pstat)  {}\nint devstat_checkversion(void *p)  { return 0; }\nvoid *devstat_alloc(void)          { return NULL; }\nCEOF",

    "CROSS_CC=$(find /usr /opt -name 'aarch64-unknown-freebsd*-gcc' 2>/dev/null | head -1) && \
     CROSS_AR=$(find /usr /opt -name 'aarch64-unknown-freebsd*-ar'  2>/dev/null | head -1) && \
     SYSROOT=/usr/local/aarch64-unknown-freebsd && \
     $CROSS_CC -c /tmp/freebsd_stubs.c -o /tmp/freebsd_stubs.o && \
     for lib in geom kvm memstat procstat devstat; do \
       [ -f ${SYSROOT}/lib/lib${lib}.a ] && echo \"lib${lib}.a exists\" && continue; \
       $CROSS_AR rcs ${SYSROOT}/lib/lib${lib}.a /tmp/freebsd_stubs.o && \
       echo \"Created: lib${lib}.a\"; \
     done && echo 'FreeBSD arm64 stubs: done'",
]
