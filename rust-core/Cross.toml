# Cross.toml — cross-compilation config for NodeX-VPN rust-core
#
# The stock ghcr.io/cross-rs/x86_64-unknown-freebsd:0.2.5 image ships an
# incomplete FreeBSD 12 sysroot: libgeom (required by the `tun` crate) is
# absent, causing a link error:
#
#   ld: cannot find -lgeom
#
# Fix: pre-build downloads the official FreeBSD 12.4-RELEASE base.txz and
# extracts only libgeom.a into the sysroot lib dir before cargo links.
# base.txz is ~180 MB but tar streaming means only the matching member is
# fully buffered.

[target.x86_64-unknown-freebsd]
pre-build = [
    "apt-get update -qq",
    "apt-get install -y --no-install-recommends curl xz-utils",
    "curl -fsSL https://download.freebsd.org/releases/amd64/12.4-RELEASE/base.txz | tar -xJ -C /usr/local/x86_64-unknown-freebsd12 --strip-components=1 usr/lib/libgeom.a",
]
